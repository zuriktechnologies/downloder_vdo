<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest Video Downloader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Pinterest Downloader</h1>
        <p>Paste Video Link:</p>
        
        <input type="text" id="url" placeholder="https://pin.it/xxxxxx">
        <button onclick="downloadVideo()">Video found</button>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
